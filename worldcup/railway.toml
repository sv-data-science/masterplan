# Railway config for the World Cup backend.
# In the Railway dashboard, set this service's Root Directory to: worldcup/
# Then Railway will find this file and the backend/Dockerfile automatically.

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
